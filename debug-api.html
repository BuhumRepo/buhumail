<!DOCTYPE html>
<html>
<head>
    <title>Debug API - Buhumail</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #00ff00; }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; }
        pre { background: #000; padding: 20px; border-radius: 5px; overflow-x: auto; }
        .error { color: #ff0000; }
        .success { color: #00ff00; }
    </style>
</head>
<body>
    <h1>🔍 Buhumail API Debugger</h1>
    
    <div>
        <button onclick="testDomainsAPI()">Test /api/domains</button>
        <button onclick="testDatabaseDirect()">Show Instructions</button>
    </div>
    
    <div id="output"></div>
    
    <script>
        const API_URL = 'https://buhumail.com/api/domains';
        
        async function testDomainsAPI() {
            const output = document.getElementById('output');
            output.innerHTML = '<p>🔄 Testing API...</p>';
            
            const token = localStorage.getItem('token');
            
            if (!token) {
                output.innerHTML = '<p class="error">❌ No token found! Please login first at buhumail.com</p>';
                return;
            }
            
            try {
                const response = await fetch(API_URL, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                let html = '<h2>API Response:</h2>';
                html += '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                
                if (data.domains) {
                    html += '<h3>Domains Found: ' + data.domains.length + '</h3>';
                    data.domains.forEach(domain => {
                        html += '<p>- ' + domain.domain + ' (system: ' + (domain.is_system_domain === 1 ? 'YES' : 'NO') + ')</p>';
                    });
                } else {
                    html += '<p class="error">❌ No domains in response</p>';
                }
                
                output.innerHTML = html;
            } catch (error) {
                output.innerHTML = '<p class="error">❌ Error: ' + error.message + '</p>';
            }
        }
        
        function testDatabaseDirect() {
            const output = document.getElementById('output');
            output.innerHTML = `
                <h2>📋 Manual Check Instructions:</h2>
                <p>Run this in your terminal:</p>
                <pre>npx wrangler d1 execute buhumail-db --remote --command "SELECT id, domain, verified, is_system_domain FROM domains;"</pre>
                
                <h3>Expected Result:</h3>
                <pre>{
  "id": "system-test-domain-001",
  "domain": "buhumail.xyz",
  "verified": 1,
  "is_system_domain": 1
}</pre>
            `;
        }
        
        // Auto-run on load
        window.onload = () => {
            if (window.location.hostname === 'buhumail.com') {
                testDomainsAPI();
            } else {
                document.getElementById('output').innerHTML = 
                    '<p class="error">⚠️ Please open this file at buhumail.com to test the API</p>';
            }
        };
    </script>
</body>
</html>
